# 預設管線拓撲：stt → mt → tts（§6.2）
# runner 讀此檔拉起各 stage；use 釘選 stage manifest 版本
# 多語擴充看 §6.3：加語言 = 改 target_langs；TTS 多引擎 = route_by 路由表
pipeline: default
nodes:
  - { id: stt, use: stt_whisperlive@0.1 }
  - { id: mt,  use: mt_vllm@0.1, after: stt,
      config: {
        api_base: "http://127.0.0.1:8001/v1",
        model: breeze-7b-mt,
        target_langs: [zh, en, ja],   # 等於 src_lang 的自動跳過
      } }
  # §6.3 路由表：runner 把 route_by 節點展開成多實例；加語言/換引擎只改這張表
  - id: tts
    route_by: lang
    routes:
      "[zh, en, ja]": tts_cosyvoice2@0.1
      # "*": tts_mms@0.1   # 低資源語言兜底（Phase 6）
    after: mt
    config:
      prompt_wav: tests/replay/golden/zh_demo.wav   # Phase 4 改為講者本人音訊
      out_dir: ~/speakin-data/tts-out
