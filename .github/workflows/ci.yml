# CI（§7.4 第一段）：lint + 無 GPU 單元測試。
# replay/e2e 測試需要 GPU + NATS + vLLM，待 self-hosted runner 後掛入。
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # 不用 --system：runner 系統 Python 受 PEP 668 externally-managed 保護會拒裝
      - name: Install deps
        run: |
          uv venv --clear   # setup-uv 設 python-version 時已預建 .venv
          uv pip install pydantic nats-py pyyaml httpx numpy pytest ruff
      - name: Lint
        run: uv run ruff check .
      - name: Unit tests
        run: uv run pytest tests/unit -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build viewer
        run: npm run build
